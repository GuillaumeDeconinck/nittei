name: Java quality

on:
  pull_request:
    paths:
      - ".mvn/**"
      - "java/**"
      - "mvnw"
      - "mvnw.cmd"
      - "scripts/quality_java.sh"
      - ".github/workflows/java-quality.yml"
  push:
    branches:
      - master
    paths:
      - ".mvn/**"
      - "java/**"
      - "mvnw"
      - "mvnw.cmd"
      - "scripts/quality_java.sh"
      - ".github/workflows/java-quality.yml"

permissions:
  contents: read

jobs:
  quality:
    name: quality
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      MAVEN_LOCAL_REPO: ~/.m2/repository

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Run Java quality gates
        run: ./scripts/quality_java.sh
